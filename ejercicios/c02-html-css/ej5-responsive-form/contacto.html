<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de software</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 class="titulos">Ponete en contacto</h1>
    
    <form action="#" method="POST" class="formulario">
        <div>
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Ej: Baltazar">
        </div>

        <div>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">
        </div>

        <div>
            <label for="mensaje">Dejame un mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="5" required minlength="10" placeholder="Escribe al menos 10 caracteres..."></textarea>
        </div>

        <button type="submit">Enviar Mensaje</button>
    </form>



    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="estudios.html">Mis Estudios</a></li>
            <li><a href="experiencia.html">Experiencia</a></li>
            <li><a href="hobbies.html">Hobbies</a></li>
            <li><a href="contacto.html">Contacto</a></li> </ul>
    </nav>
    
</body>
</html>
